<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Yalla Farm Control Deck</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="bg-layer" aria-hidden="true">
    <div class="orb orb-a"></div>
    <div class="orb orb-b"></div>
    <div class="grid-mask"></div>
  </div>

  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark">YF</span>
        <div>
          <h1>Yalla Farm Control Deck</h1>
          <p>Unified frontend for auth, medicines, basket, orders, admins and refunds</p>
        </div>
      </div>

      <div class="session-panel">
        <label>
          API Base URL
          <input id="baseUrlInput" type="text" placeholder="https://localhost:5001">
        </label>
        <label>
          Bearer Token
          <input id="tokenInput" type="text" placeholder="Paste JWT token">
        </label>
        <div class="session-actions">
          <button id="saveSessionBtn" class="btn btn-ghost" type="button">Save Session</button>
          <button id="clearSessionBtn" class="btn btn-ghost" type="button">Clear Session</button>
        </div>
      </div>
    </header>

    <div class="workspace">
      <aside class="sidebar">
        <h2>Domains</h2>
        <nav id="sectionNav" class="section-nav"></nav>
      </aside>

      <main class="main">
        <section class="section-head">
          <h2 id="sectionTitle"></h2>
          <p id="sectionDescription"></p>
        </section>

        <section id="cardsGrid" class="cards-grid"></section>

        <section class="response-panel">
          <div class="response-head">
            <h3>Response Inspector</h3>
            <p id="responseMeta">Run any action to inspect API response.</p>
          </div>
          <pre id="responseOutput">No response yet.</pre>
        </section>
      </main>
    </div>
  </div>

  <template id="actionCardTemplate">
    <article class="action-card">
      <header>
        <span class="method-pill"></span>
        <h3></h3>
      </header>
      <p class="action-description"></p>
      <label>
        Endpoint Path
        <input class="path-input" type="text">
      </label>
      <label class="query-wrap">
        Query JSON
        <textarea class="query-input" rows="4"></textarea>
      </label>
      <label class="headers-wrap">
        Extra Headers JSON
        <textarea class="headers-input" rows="4"></textarea>
      </label>
      <label class="body-wrap">
        Body JSON
        <textarea class="body-input" rows="8"></textarea>
      </label>
      <div class="multipart-wrap">
        <label>
          MedicineId
          <input class="multipart-medicine-id" type="text" placeholder="00000000-0000-0000-0000-000000000000">
        </label>
        <label>
          IsMain
          <select class="multipart-is-main">
            <option value="true">true</option>
            <option value="false">false</option>
          </select>
        </label>
        <label>
          IsMinimal
          <select class="multipart-is-minimal">
            <option value="true">true</option>
            <option value="false">false</option>
          </select>
        </label>
        <label>
          Image File
          <input class="multipart-file" type="file" accept=".jpg,.jpeg,.png,.gif,.bmp,.webp,image/*">
        </label>
      </div>
      <button class="btn btn-primary run-btn" type="button">Run Action</button>
    </article>
  </template>

  <script src="./app.js"></script>
</body>
</html>
