# ============================================
# DEV override — auto-merged on top of docker-compose.yml by plain
# `docker compose up` (Compose's default override discovery). Adds the
# local Postgres / MinIO / OpenSearch stack, exposes host ports for
# direct browser/curl access, and wires API health-gates onto them.
#
# Usage: docker compose --env-file .env.dev up -d --build
#
# Differences from dev.yml (staging) and prod.yml:
#   - builds images locally instead of pulling from ghcr.io
#   - binds host ports (3000, 5000, 5433, 9000/9001, 9200) for direct
#     browser / curl access
#   - bundles the local stack (postgres + minio + opensearch) as
#     additional services and adds them to the api's depends_on list
#   - NO `restart:` — if something dies in local dev you want to see it
#     fall over, not auto-recover and hide the bug
#
# Heads up: never `down -v` here — the postgres-data + minio-data
# volumes hold real local dev state (catalog, prescriptions, MinIO
# objects). They're declared `external: true` on purpose so a stray
# `docker compose down -v` can't drop them.
# ============================================

services:

  front:
    image: yalla/front:dev
    build:
      context: ./yalla-farm-front
      dockerfile: Dockerfile
      args:
        - INTERNAL_API_URL=${INTERNAL_API_URL:-http://api:8080}
        - NEXT_PUBLIC_YANDEX_MAPS_API_KEY=${NEXT_PUBLIC_YANDEX_MAPS_API_KEY:-}
    container_name: yalla-front
    ports:
      - "3000:3000"

  api:
    image: yalla/api:dev
    build: ./yalla-back
    container_name: yalla-api
    ports:
      - "5000:8080"
    # Local-stack health gates — the base file already lists `front →
    # api` only. Add postgres/minio/opensearch here because they only
    # exist in this override; on staging/prod the api connects to
    # managed externals and these services aren't part of the compose
    # project at all.
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      opensearch:
        condition: service_healthy

  postgres:
    image: postgres:16
    container_name: yalla-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-app_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - yalla-net

  minio:
    image: minio/minio
    container_name: yalla-minio
    command: server /data --console-address ":9001"
    ports:
      # 9000 — S3 API, 9001 — admin console (login: minioadmin/minioadmin).
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - yalla-net

  # OpenSearch replaces the previous Elasticsearch container — same
  # REST surface (it's a fork of ES 7.10, so the existing raw-HttpClient
  # search engine in Infrastructure works unchanged). Security plugin
  # is disabled because this is local dev only; never do this in prod.
  opensearch:
    image: opensearchproject/opensearch:2.13.0
    container_name: yalla-opensearch
    environment:
      - cluster.name=yalla-search
      - node.name=os-node-1
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - OPENSEARCH_JAVA_OPTS=-Xms256m -Xmx512m
      # No HTTPS / no auth in dev — DISABLE_SECURITY_PLUGIN turns the
      # demo certificates + internal users off so requests are plain
      # HTTP. DISABLE_INSTALL_DEMO_CONFIG skips the bundled cert
      # generation step that otherwise runs on every cold start.
      - DISABLE_SECURITY_PLUGIN=true
      - DISABLE_INSTALL_DEMO_CONFIG=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    networks:
      - yalla-net

# Local network name — kept without an environment suffix because the
# playbook explicitly carves out local dev as the one allowed to do so.
# Create once on the host: `docker network create yalla-net`.
networks:
  yalla-net:
    external: true
    name: yalla-net

volumes:
  # Declared external so a stray `docker compose down -v` can't wipe
  # the local dev catalog / minio object store. Create them once:
  #   docker volume create postgres-data
  #   docker volume create minio-data
  postgres-data:
    external: true
  minio-data:
    external: true
  # OpenSearch data is safe to recreate — it's a derived index of the
  # catalog and the API re-syncs it on boot via the reindex hosted
  # service. So it stays internal (lifecycle tied to the compose project).
  opensearch-data:
