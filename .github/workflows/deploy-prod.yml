name: Deploy Prod

# Same shape as deploy-dev.yml but guarded by GitHub Environments:
# `production` should be configured with Required Reviewers in repo
# settings → Environments → production. Without an approver clicking
# the green button, the deploy job blocks here.

on:
  workflow_run:
    workflows: ["Build & Push Images"]
    types: [completed]
    branches: [master]

permissions:
  contents: read

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}
    steps:
      # Preflight — checks that all three deploy secrets are populated.
      # If they are, downstream steps run; if not, the SSH step is
      # skipped and the workflow finishes green with a ::notice::
      # annotation. This deliberately does NOT fail the run: until the
      # VPS is set up there's nothing to deploy to, and a red X on
      # every push to master would only train people to ignore it.
      # Once any of `DEPLOY_PROD_HOST` / `DEPLOY_PROD_USER` /
      # `DEPLOY_PROD_SSH_KEY` is added under Settings → Secrets and
      # variables → Actions, the next workflow_run picks them up.
      - name: Check deploy secrets
        id: preflight
        env:
          HOST: ${{ secrets.DEPLOY_PROD_HOST }}
          USER: ${{ secrets.DEPLOY_PROD_USER }}
          KEY:  ${{ secrets.DEPLOY_PROD_SSH_KEY }}
        run: |
          missing=()
          [ -z "$HOST" ] && missing+=("DEPLOY_PROD_HOST")
          [ -z "$USER" ] && missing+=("DEPLOY_PROD_USER")
          [ -z "$KEY"  ] && missing+=("DEPLOY_PROD_SSH_KEY")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::notice::Production deploy skipped — missing secrets: ${missing[*]}. Add them under Settings → Secrets and variables → Actions to enable."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true"  >> "$GITHUB_OUTPUT"
          fi
      - if: steps.preflight.outputs.ready == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_PROD_HOST }}
          username: ${{ secrets.DEPLOY_PROD_USER }}
          key: ${{ secrets.DEPLOY_PROD_SSH_KEY }}
          # `set -e` at the top of the script below replaces what
          # appleboy/ssh-action@v0's script_stop input used to do —
          # the input was dropped in v1, the equivalent is just to
          # use bash's own errexit inside the script.
          script: |
            set -e
            cd /srv/yalla-farm

            git fetch origin master
            git checkout ${{ github.event.workflow_run.head_sha }}

            docker network inspect yalla-net-prod >/dev/null 2>&1 \
              || docker network create yalla-net-prod

            export TAG=latest
            export IMAGE_OWNER=${{ github.repository_owner }}

            docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env pull
            docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env up -d --remove-orphans

            docker image prune -f
