services:

  front:
    build:
      context: ./yalla-farm-front
      dockerfile: Dockerfile
      args:
        - INTERNAL_API_URL=http://api:8080
        - NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=AIzaSyCiMKUxv6jKAzDC_ncZvgHP0c-6mRBczYY
    container_name: yalla-front
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - yalla-network

  api:
    build: ./yalla-back
    container_name: yalla-api
    ports:
      - "5000:8080"
    depends_on:
      - postgres
      - minio
      - elasticsearch
    environment:
      - Elasticsearch__Url=http://elasticsearch:9200
      - Database__ApplyMigrationsOnStartup=true
      - ConnectionStrings__Default=Host=postgres;Port=5432;Database=app_db;Username=postgres;Password=postgres
      - MinIo__Endpoint=minio:9000
      - MinIo__ContainerEndpoint=minio:9000
      - MinIo__AccessKey=minioadmin
      - MinIo__SecretKey=minioadmin
      - MinIo__BucketName=yalla-farm-medicines
      - MinIo__UseSsl=false
    networks:
      - yalla-network

  postgres:
    image: postgres:16
    container_name: yalla-postgres
    restart: always
    environment:
      POSTGRES_DB: app_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - yalla-network

  elasticsearch:
    image: elasticsearch:8.13.0
    container_name: yalla-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms256m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - yalla-network

  minio:
    image: minio/minio
    container_name: yalla-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    networks:
      - yalla-network

networks:
  yalla-network:

volumes:
  postgres-data:
    external: true
  minio-data:
    external: true
  elasticsearch-data:
