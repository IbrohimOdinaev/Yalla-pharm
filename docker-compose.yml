# ============================================
# DEV: all services local
# Usage: docker compose --env-file .env.dev up -d --build
# Pre-req: docker network create yalla-net
# ============================================

services:

  front:
    build:
      context: ./yalla-farm-front
      dockerfile: Dockerfile
      args:
        - INTERNAL_API_URL=${INTERNAL_API_URL:-http://api:8080}
        - NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}
    image: yalla/front:dev
    container_name: yalla-front
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - yalla-net

  api:
    build: ./yalla-back
    image: yalla/api:dev
    container_name: yalla-api
    restart: unless-stopped
    ports:
      - "5000:8080"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/categories || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    environment:
      - ConnectionStrings__Default=${DB_CONNECTION_STRING}
      - Database__ApplyMigrationsOnStartup=${DB_APPLY_MIGRATIONS:-true}
      - Jwt__Key=${JWT_KEY}
      - Jwt__Issuer=${JWT_ISSUER:-Yalla.Api}
      - Jwt__Audience=${JWT_AUDIENCE:-Yalla.Api.Client}
      - Jwt__AccessTokenMinutes=${JWT_ACCESS_TOKEN_MINUTES:-43200}
      - MinIo__Endpoint=${MINIO_ENDPOINT}
      - MinIo__ContainerEndpoint=${MINIO_ENDPOINT}
      - MinIo__AccessKey=${MINIO_ACCESS_KEY}
      - MinIo__SecretKey=${MINIO_SECRET_KEY}
      - MinIo__BucketName=${MINIO_BUCKET}
      - MinIo__UseSsl=${MINIO_USE_SSL:-false}
      - Elasticsearch__Url=${ELASTICSEARCH_URL}
      - Elasticsearch__MedicineIndex=${ELASTICSEARCH_INDEX:-medicines}
      - Telegram__BotToken=${TELEGRAM_BOT_TOKEN}
      - Telegram__BotUsername=${TELEGRAM_BOT_USERNAME}
      - Telegram__WebhookPublicBaseUrl=${TELEGRAM_WEBHOOK_URL}
      - Telegram__WebhookSecretToken=${TELEGRAM_WEBHOOK_SECRET}
      - Telegram__AutoRegisterWebhookOnStart=${TELEGRAM_AUTO_REGISTER_WEBHOOK:-false}
      - WooCommerce__BaseUrl=${WOOCOMMERCE_BASE_URL}
      - WooCommerce__ConsumerKey=${WOOCOMMERCE_CONSUMER_KEY}
      - WooCommerce__ConsumerSecret=${WOOCOMMERCE_CONSUMER_SECRET}
      - WooCommerce__WebhookSecret=${WOOCOMMERCE_WEBHOOK_SECRET}
      - WooCommerce__PharmacyId=${WOOCOMMERCE_PHARMACY_ID}
      - OsonSms__Login=${OSON_SMS_LOGIN}
      - OsonSms__Token=${OSON_SMS_TOKEN}
      - OsonSms__PassSaltHash=${OSON_SMS_PASS_SALT_HASH}
      - OsonSms__UseStub=${OSON_SMS_USE_STUB:-true}
      - DushanbeCityPayment__BaseUrl=${DC_PAYMENT_BASE_URL}
      - Jura__BaseUrl=${JURA_BASE_URL}
      - Jura__Login=${JURA_LOGIN}
      - Jura__Password=${JURA_PASSWORD}
      - Cors__AllowedOrigins__0=${CORS_ORIGIN_0:-http://localhost:3000}
      - Cors__AllowedOrigins__1=${CORS_ORIGIN_1:-http://127.0.0.1:3000}
    networks:
      - yalla-net

  postgres:
    image: postgres:16
    container_name: yalla-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-app_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - yalla-net

  elasticsearch:
    image: elasticsearch:8.13.0
    container_name: yalla-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms256m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks:
      - yalla-net

  minio:
    image: minio/minio
    container_name: yalla-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - yalla-net

networks:
  yalla-net:
    name: yalla-net
    external: true

volumes:
  postgres-data:
    external: true
  minio-data:
    external: true
  elasticsearch-data:
