# ============================================
# BASE compose — front + api, shared by dev and prod.
#
# Defaults to DEV when you run plain `docker compose ...` because the
# adjacent docker-compose.override.yml is auto-loaded and adds the
# local-stack services (postgres / minio / opensearch) on top.
#
#   Dev (default, picks up override.yml automatically):
#     docker compose --env-file .env.dev up -d --build
#
#   Prod (explicit overrides, ignores override.yml):
#     docker compose -f docker-compose.yml -f docker-compose.prod.yml \
#       --env-file .env.prod up -d --build
#
# Pre-req: `docker network create yalla-net` (once per host).
# ============================================

services:

  front:
    build:
      context: ./yalla-farm-front
      dockerfile: Dockerfile
      args:
        - INTERNAL_API_URL=${INTERNAL_API_URL:-http://api:8080}
        - NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY:-${GOOGLE_MAPS_API_KEY:-}}
        - NEXT_PUBLIC_YANDEX_MAPS_API_KEY=${NEXT_PUBLIC_YANDEX_MAPS_API_KEY:-}
        - NEXT_PUBLIC_MAP_PROVIDER=${NEXT_PUBLIC_MAP_PROVIDER:-}
    container_name: yalla-front
    restart: unless-stopped
    # No host port mapping here — the dev override binds 3000:3000 for
    # local browsers; in prod the front is reached through the reverse
    # proxy on the same docker network.
    expose:
      - "3000"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - yalla-net

  api:
    build: ./yalla-back
    container_name: yalla-api
    restart: unless-stopped
    # Same as front — host port binding lives in the dev override only.
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/categories || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    environment:
      - ConnectionStrings__Default=${DB_CONNECTION_STRING}
      - Database__ApplyMigrationsOnStartup=${DB_APPLY_MIGRATIONS:-true}
      - Jwt__Key=${JWT_KEY}
      - Jwt__Issuer=${JWT_ISSUER:-Yalla.Api}
      - Jwt__Audience=${JWT_AUDIENCE:-Yalla.Api.Client}
      - Jwt__AccessTokenMinutes=${JWT_ACCESS_TOKEN_MINUTES:-43200}
      - MinIo__Endpoint=${MINIO_ENDPOINT}
      - MinIo__ContainerEndpoint=${MINIO_CONTAINER_ENDPOINT:-${MINIO_ENDPOINT}}
      - MinIo__AccessKey=${MINIO_ACCESS_KEY}
      - MinIo__SecretKey=${MINIO_SECRET_KEY}
      - MinIo__BucketName=${MINIO_BUCKET}
      - MinIo__UseSsl=${MINIO_USE_SSL:-false}
      # `Elasticsearch:*` config keys stay as-is — the search engine
      # uses raw HttpClient + JSON, so swapping the cluster behind the
      # URL between Elasticsearch and OpenSearch is invisible to the
      # backend. Dev's override points this at opensearch:9200, prod
      # points wherever the deployment uses (managed ES, OpenSearch
      # Service, etc.).
      - Elasticsearch__Url=${ELASTICSEARCH_URL:-}
      - Elasticsearch__MedicineIndex=${ELASTICSEARCH_INDEX:-medicines}
      # Auth — optional. Used by managed clusters (Bonsai / AWS
      # OpenSearch / Elastic Cloud). Dev's bundled OpenSearch runs
      # with the security plugin disabled so these stay empty there.
      - Elasticsearch__Username=${ELASTICSEARCH_USERNAME:-}
      - Elasticsearch__Password=${ELASTICSEARCH_PASSWORD:-}
      - Elasticsearch__ApiKey=${ELASTICSEARCH_API_KEY:-}
      - Telegram__BotToken=${TELEGRAM_BOT_TOKEN}
      - Telegram__BotUsername=${TELEGRAM_BOT_USERNAME}
      - Telegram__WebhookPublicBaseUrl=${TELEGRAM_WEBHOOK_URL}
      - Telegram__WebhookSecretToken=${TELEGRAM_WEBHOOK_SECRET}
      - Telegram__AutoRegisterWebhookOnStart=${TELEGRAM_AUTO_REGISTER_WEBHOOK:-false}
      - WooCommerce__BaseUrl=${WOOCOMMERCE_BASE_URL}
      - WooCommerce__ConsumerKey=${WOOCOMMERCE_CONSUMER_KEY}
      - WooCommerce__ConsumerSecret=${WOOCOMMERCE_CONSUMER_SECRET}
      - WooCommerce__WebhookSecret=${WOOCOMMERCE_WEBHOOK_SECRET}
      - WooCommerce__PharmacyId=${WOOCOMMERCE_PHARMACY_ID}
      - OsonSms__Login=${OSON_SMS_LOGIN}
      - OsonSms__Token=${OSON_SMS_TOKEN}
      - OsonSms__PassSaltHash=${OSON_SMS_PASS_SALT_HASH}
      - OsonSms__UseStub=${OSON_SMS_USE_STUB:-false}
      - DushanbeCityPayment__BaseUrl=${DC_PAYMENT_BASE_URL}
      - Jura__BaseUrl=${JURA_BASE_URL}
      - Jura__Login=${JURA_LOGIN}
      - Jura__Password=${JURA_PASSWORD}
      - Cors__AllowedOrigins__0=${CORS_ORIGIN_0:-http://localhost:3000}
      - Cors__AllowedOrigins__1=${CORS_ORIGIN_1:-http://127.0.0.1:3000}
    networks:
      - yalla-net

networks:
  yalla-net:
    name: yalla-net
    external: true
