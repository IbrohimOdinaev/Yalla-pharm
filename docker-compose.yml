services:
  yalla-postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  yalla-minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  yalla-api:
    build: .
    ports:
      - "8080:8080"
    environment:
      ConnectionStrings__Default: "Host=yalla-postgres;Port=5432;Database=app_db;Username=postgres;Password=postgres"
      Database__ApplyMigrationsOnStartup: "true"
      MinIo__Endpoint: "yalla-minio:9000"
      MinIo__ContainerEndpoint: "yalla-minio:9000"
      MinIo__AccessKey: "minioadmin"
      MinIo__SecretKey: "minioadmin"
      MinIo__BucketName: "yalla-farm-medicines"
      MinIo__UseSsl: "false"
    depends_on:
      yalla-postgres:
        condition: service_healthy
      yalla-minio:
        condition: service_healthy

volumes:
  pgdata:
  miniodata:
